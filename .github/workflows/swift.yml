name: Xcode - Build and Test

on:
     push:
          branches: ['master']
     pull_request:
          branches: ['master']

jobs:
     test:
          runs-on: macos-14

          steps:
               - uses: actions/checkout@v4

               - name: Select Xcode
                 run: sudo xcode-select -s /Applications/Xcode_15.4.app

               - name: Install xcpretty
                 run: gem install xcpretty --no-document

               - name: Cache SPM
                 uses: actions/cache@v4
                 with:
                      path: |
                           ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
                      key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
                      restore-keys: |
                           ${{ runner.os }}-spm-

               - name: Cache Pods
                 uses: actions/cache@v4
                 with:
                      path: Pods
                      key: ${{ runner.os }}-pods-${{ hashFiles('**/Podfile.lock') }}
                      restore-keys: |
                           ${{ runner.os }}-pods-

               - name: Cache DerivedData
                 uses: actions/cache@v4
                 with:
                      path: DerivedData
                      key: ${{ runner.os }}-dd-${{ hashFiles('**/project.pbxproj','**/Package.resolved','**/Podfile.lock') }}
                      restore-keys: |
                           ${{ runner.os }}-dd-

               - name: Detect project/workspace + scheme
                 run: |
                      set -euo pipefail

                      if compgen -G "*.xcworkspace" > /dev/null; then
                        FILE_FLAG="-workspace"
                        FILE_TO_BUILD=$(ls *.xcworkspace | head -n1)
                      else
                        FILE_FLAG="-project"
                        FILE_TO_BUILD=$(ls *.xcodeproj | head -n1)
                      fi

                      SCHEME=$(xcodebuild -list -json $FILE_FLAG "$FILE_TO_BUILD" | \
                        /usr/bin/python3 -c "import sys,json; d=json.load(sys.stdin); print((d.get('workspace') or d.get('project'))['schemes'][0])")

                      echo "FILE_FLAG=$FILE_FLAG" >> $GITHUB_ENV
                      echo "FILE_TO_BUILD=$FILE_TO_BUILD" >> $GITHUB_ENV
                      echo "SCHEME=$SCHEME" >> $GITHUB_ENV

               - name: Boot Simulator
                 run: |
                      xcrun simctl boot "iPhone 14" || true
                      xcrun simctl bootstatus "iPhone 14" -b

               - name: Run tests
                 run: |
                      set -o pipefail

                      DEST="platform=iOS Simulator,name=iPhone 14,OS=latest"

                      xcodebuild \
                        test \
                        $FILE_FLAG "$FILE_TO_BUILD" \
                        -scheme "$SCHEME" \
                        -destination "$DEST" \
                        -derivedDataPath "$PWD/DerivedData" \
                        -resultBundlePath TestResults \
                        -parallel-testing-enabled YES \
                        -quiet \
                      | xcpretty
